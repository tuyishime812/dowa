[build]
  base = "frontend"
  publish = "frontend"
  command = "echo 'No build needed for static site'"

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

[[redirects]]
  from = "/track/*"
  to = "/index.html"
  status = 200

[build.environment]
  API_BASE_URL = "https://your-railway-url.up.railway.app"
